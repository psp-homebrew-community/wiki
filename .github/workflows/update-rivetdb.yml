name: Update RivetDB
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch RivetDB
        run: |
          mkdir -p assets/data
          curl -sSL https://raw.githubusercontent.com/isage/rivetdb-psp/master/rivetdb.json -o assets/data/rivetdb.json
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/rivetdb.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update rivetdb.json" && git push)
