name: Update Homebrew
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Homebrew
        run: |
          mkdir -p _data
          curl 'https://archive.org/advancedsearch.php?q=collection%3Apsp-homebrew-library&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=description&fl[]=version&fl[]=date&sort[]=titleSorter+asc&rows=10000&page=1&output=json' -o _data/homebrew.json
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/homebrew.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update homebrew.json" && git push)
